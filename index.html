<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог Исмаила</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: #fff; padding: 40px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 400px; width: 100%; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #333; }
        p { font-size: 16px; color: #666; margin-bottom: 30px; line-height: 1.5; }
        .btn { display: inline-block; background-color: #0088cc; color: white; text-decoration: none; padding: 16px 20px; border-radius: 8px; font-size: 18px; font-weight: bold; width: 100%; box-sizing: border-box; transition: background-color 0.3s; }
        .btn:hover { background-color: #0077b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ассалому алайкум 🇹🇯</h1>
        <p>Вы переходите в мой официальный блог. Нажмите на кнопку ниже, чтобы открыть Telegram.</p>

    </div>
</body>
</html>
